<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compare Cities — Aura Weather</title>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .cmp-page { max-width: 880px; margin: 0 auto; padding: 0 16px 80px; }
    .cmp-heading { font-size: 28px; font-weight: 300; color: white; letter-spacing: -0.5px; margin: 20px 0 4px; }
    .cmp-sub { font-size: 14px; color: rgba(255,255,255,0.40); margin-bottom: 20px; }

    /* Search bar row */
    .cmp-search-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .cmp-search-wrap { flex: 1; position: relative; }
    .cmp-search-input { width: 100%; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18); border-top-color: rgba(255,255,255,0.28); border-radius: 14px; padding: 12px 16px; font-size: 15px; color: white; font-family: inherit; outline: none; transition: all 0.18s; }
    .cmp-search-input::placeholder { color: rgba(255,255,255,0.30); }
    .cmp-search-input:focus { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); }
    .cmp-drop { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200; border-radius: 14px; overflow: hidden; display: none; max-height: 280px; overflow-y: auto; background: rgba(14,16,30,0.96); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.14); box-shadow: 0 8px 40px rgba(0,0,0,0.55); }
    .cmp-drop.open { display: block; }
    .cmp-drop-item { padding: 11px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.12s; }
    .cmp-drop-item:hover { background: rgba(255,255,255,0.08); }
    .cmp-vs { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.35); padding: 0 2px; flex-shrink: 0; }
    #cmp-go { padding: 12px 22px; border-radius: 14px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22); color: white; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    #cmp-go:hover { background: rgba(255,255,255,0.24); }

    /* Dual hero */
    .cmp-heroes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .cmp-hero { padding: 20px; border-radius: 20px; }
    .cmp-hero-city { font-size: 20px; font-weight: 600; color: white; }
    .cmp-hero-state { font-size: 12px; color: rgba(255,255,255,0.40); margin-bottom: 8px; }
    .cmp-hero-icon { font-size: 36px; line-height: 1; margin-bottom: 4px; }
    .cmp-hero-temp { font-size: 48px; font-weight: 200; color: white; letter-spacing: -2px; line-height: 1; }
    .cmp-hero-condition { font-size: 14px; color: rgba(255,255,255,0.55); margin-top: 4px; }
    .cmp-hero-hilo { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 6px; display: flex; gap: 8px; }

    /* Metrics */
    .cmp-metrics-card { padding: 18px 20px; margin-bottom: 12px; }
    .cmp-metrics-header { display: flex; justify-content: space-between; margin-bottom: 14px; }
    .cmp-city-legend { font-size: 12px; font-weight: 600; display: flex; gap: 16px; }
    .legend-a { color: #64B5F6; } .legend-b { color: #F48FB1; }
    .cmp-metrics-list { display: flex; flex-direction: column; gap: 12px; }
    .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); margin-bottom: 5px; }
    .metric-row { display: flex; align-items: center; gap: 10px; }
    .metric-val-a, .metric-val-b { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.55); min-width: 60px; }
    .metric-val-a { text-align: right; } .metric-val-b { text-align: left; }
    .metric-val-a.winner, .metric-val-b.winner { color: white; }
    .metric-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .metric-bar-wrap { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .metric-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

    /* Chart */
    .cmp-chart-card { padding: 20px; margin-bottom: 12px; }
    .cmp-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cmp-chart-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.40); }
    .cmp-legend { display: flex; gap: 16px; }
    .cmp-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.50); }
    .cmp-legend-dot { width: 10px; height: 3px; border-radius: 2px; }
    #cmp-chart { width: 100%; display: block; }

    @media (max-width: 560px) {
      .cmp-search-row { flex-wrap: wrap; }
      .cmp-search-wrap { flex: 1 1 calc(50% - 20px); }
      .cmp-vs { display: none; }
      .cmp-heroes { grid-template-columns: 1fr; }
      .metric-val-a, .metric-val-b { min-width: 48px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="weather-bg" class="bg-partly-day"></div>
<div id="particles" aria-hidden="true"></div>

<nav class="site-nav">
  <a href="index.html" class="nav-brand"><span class="nav-brand-icon">🌤</span>Aura</a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link">Weather</a>
    <a href="forecast.html"    class="nav-link">Forecast</a>
    <a href="air-quality.html" class="nav-link">Air Quality</a>
    <a href="radar.html"       class="nav-link">Radar</a>
    <a href="outfit.html"      class="nav-link">Wear</a>
    <a href="timemachine.html" class="nav-link">History</a>
    <a href="compare.html"     class="nav-link active">Compare</a>
    <a href="storms.html"      class="nav-link">Storms</a>
  </div>
  <div class="nav-right">
    <div class="unit-toggle" id="unit-toggle" role="group">
      <span class="unit-opt active" data-unit="F">°F</span>
      <span class="unit-opt"        data-unit="C">°C</span>
    </div>
  </div>
</nav>

<div class="cmp-page page-enter">
  <h1 class="cmp-heading">Compare Cities</h1>
  <p class="cmp-sub">Side-by-side weather for any two locations.</p>

  <div class="cmp-search-row">
    <div class="cmp-search-wrap">
      <input class="cmp-search-input" id="search-a" placeholder="First city..." autocomplete="off"/>
      <div class="cmp-drop" id="drop-a"></div>
    </div>
    <span class="cmp-vs">vs</span>
    <div class="cmp-search-wrap">
      <input class="cmp-search-input" id="search-b" placeholder="Second city..." autocomplete="off"/>
      <div class="cmp-drop" id="drop-b"></div>
    </div>
    <button id="cmp-go">Compare</button>
  </div>

  <div id="cmp-result" style="display:none">
    <div class="cmp-heroes">
      <div class="glass cmp-hero" id="cmp-hero-a">
        <div class="cmp-hero-city" id="cmp-a-city">—</div>
        <div class="cmp-hero-state" id="cmp-a-state">—</div>
        <div class="cmp-hero-icon" id="cmp-a-icon">—</div>
        <div class="cmp-hero-temp" id="cmp-a-temp">—</div>
        <div class="cmp-hero-condition" id="cmp-a-condition">—</div>
        <div class="cmp-hero-hilo"><span id="cmp-a-high">—</span><span id="cmp-a-low">—</span></div>
      </div>
      <div class="glass cmp-hero" id="cmp-hero-b">
        <div class="cmp-hero-city" id="cmp-b-city">—</div>
        <div class="cmp-hero-state" id="cmp-b-state">—</div>
        <div class="cmp-hero-icon" id="cmp-b-icon">—</div>
        <div class="cmp-hero-temp" id="cmp-b-temp">—</div>
        <div class="cmp-hero-condition" id="cmp-b-condition">—</div>
        <div class="cmp-hero-hilo"><span id="cmp-b-high">—</span><span id="cmp-b-low">—</span></div>
      </div>
    </div>

    <div class="glass cmp-metrics-card">
      <div class="cmp-metrics-header">
        <div class="cmp-city-legend">
          <span class="legend-a" id="legend-a-name">City A</span>
          <span class="legend-b" id="legend-b-name">City B</span>
        </div>
      </div>
      <div class="cmp-metrics-list">
        <div id="metric-temp"></div>
        <div id="metric-feels"></div>
        <div id="metric-humidity"></div>
        <div id="metric-wind"></div>
        <div id="metric-uv"></div>
        <div id="metric-pressure"></div>
        <div id="metric-precip"></div>
      </div>
    </div>

    <div class="glass cmp-chart-card">
      <div class="cmp-chart-header">
        <div class="cmp-chart-title">7-Day High Temperature</div>
        <div class="cmp-legend">
          <div class="cmp-legend-item"><div class="cmp-legend-dot" style="background:#64B5F6"></div><span id="chart-legend-a">City A</span></div>
          <div class="cmp-legend-item"><div class="cmp-legend-dot" style="background:#F48FB1"></div><span id="chart-legend-b">City B</span></div>
        </div>
      </div>
      <canvas id="cmp-chart"></canvas>
    </div>
  </div>
</div>

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="toast" role="alert"></div>

<script src="js/codes.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/compare.js"></script>
</body>
</html>
